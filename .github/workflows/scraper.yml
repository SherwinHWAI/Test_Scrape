name: Weekly Automation Pipeline

on:
  schedule:
    - cron: "10 14 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: self-hosted

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      MODEL: ${{ secrets.MODEL }}
      OPENROUTER_URL: ${{ secrets.OPENROUTER_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check Python
        run: "C:\\Users\\data.science\\AppData\\Local\\Programs\\Python\\Python314\\python.exe --version"

      - name: Install Dependencies
        run: "C:\\Users\\data.science\\AppData\\Local\\Programs\\Python\\Python314\\python.exe -m pip install -r requirements.txt"

      - name: Run Stage 1
        run: "C:\\Users\\data.science\\AppData\\Local\\Programs\\Python\\Python314\\python.exe stage1_code.py"

      - name: Run Stage 2
        run: "C:\\Users\\data.science\\AppData\\Local\\Programs\\Python\\Python314\\python.exe stage2_code.py"

      - name: Run Stage 3
        run: "C:\\Users\\data.science\\AppData\\Local\\Programs\\Python\\Python314\\python.exe stage3_code.py"

      - name: Commit and Push Outputs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"
          git add OUTPUT_STAGE1/ OUTPUT_STAGE2/ OUTPUT_STAGE3/
          $changes = git status --porcelain
          if ($changes) {git commit -m "Update pipeline outputs"}
          git push

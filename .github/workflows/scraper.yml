name: Weekly Scraper

on:
  schedule:
    - cron: '30 4 * * 1'   # Monday 10:00 AM IST
  workflow_dispatch:

jobs:
  run-scraper:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install packages
        run: pip install -r requirements.txt

      - name: Run script
        run: python scraper.py

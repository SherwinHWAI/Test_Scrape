name: Weekly Automation Pipeline

on:
  schedule:
    - cron: "0 21 * * 5"   # Every Friday at 21:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  run-pipeline:
    runs-on: self-hosted

    env:
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
      MODEL: ${{ secrets.MODEL }}
      OPENROUTER_URL: ${{ secrets.OPENROUTER_URL }}

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Ensure Python exists (safe fallback)
      - name: Check Python
        run: |
          python --version || echo "Python not found! Make sure it's installed on the runner."

      # Install dependencies (only if requirements.txt exists)
      # - name: Install Dependencies
      #   run: |
      #     if [ -f requirements.txt ]; then
      #       pip install -r requirements.txt
      #     else
      #       echo "No requirements.txt found, skipping install."
      #     fi

      - name: Run Stage 1
        run: python stage1_code.py

      - name: Run Stage 2
        run: python stage2_code.py

      - name: Run Stage 3
        run: python stage3_code.py

      - name: Commit and Push Outputs
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "github-actions@github.com"

          git add OUTPUT_STAGE1/ OUTPUT_STAGE2/ OUTPUT_STAGE3/ || true

          changes=$(git status --porcelain)

          if [ -n "$changes" ]; then
            echo "Changes detected. Committing..."
            git commit -m "Update pipeline outputs"

            # Pull latest changes to avoid conflicts
            git pull --rebase

            git push
          else
            echo "No changes to commit."
          fi
